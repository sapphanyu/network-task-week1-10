# Layer 4: Transport (TCP)
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# Layer 7: Application (HTTP/HTTPS)
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # ========================================================================
    # COMPREHENSIVE LOGGING FOR THAILAND DIGITAL CRIME ACT COMPLIANCE
    # All connections (success/failure) are logged with complete audit trail
    # ========================================================================
    
    # Standard access log format (ISO 8601 timestamp, connection details)
    log_format main '$remote_addr|$remote_user|[$time_iso8601]|"$request"|'
                    '$status|$body_bytes_sent|"$http_referer"|'
                    '"$http_user_agent"|$http_x_forwarded_for|'
                    '$request_time|$upstream_response_time|$upstream_addr|$upstream_status';
    
    # Detailed audit log format (complete request/response tracking for legal compliance)
    log_format audit_detailed '{'
                              '"timestamp":"$time_iso8601",'
                              '"client_ip":"$remote_addr",'
                              '"remote_user":"$remote_user",'
                              '"request_method":"$request_method",'
                              '"request_uri":"$request_uri",'
                              '"request_protocol":"$server_protocol",'
                              '"response_status":$status,'
                              '"response_bytes_sent":$body_bytes_sent,'
                              '"request_time":$request_time,'
                              '"upstream_addr":"$upstream_addr",'
                              '"upstream_status":"$upstream_status",'
                              '"upstream_response_time":$upstream_response_time,'
                              '"http_referer":"$http_referer",'
                              '"user_agent":"$http_user_agent",'
                              '"x_forwarded_for":"$http_x_forwarded_for",'
                              '"x_forwarded_proto":"$http_x_forwarded_proto",'
                              '"ssl_protocol":"$ssl_protocol",'
                              '"ssl_cipher":"$ssl_cipher",'
                              '"connection_id":"$connection",'
                              '"request_id":"$http_x_request_id"'
                              '}';
    
    # Connection failure/error log format
    log_format connection_error '{'
                                '"timestamp":"$time_iso8601",'
                                '"event":"CONNECTION_ERROR",'
                                '"client_ip":"$remote_addr",'
                                '"request":"$request",'
                                '"status":$status,'
                                '"upstream":"$upstream_addr",'
                                '"upstream_status":"$upstream_status",'
                                '"upstream_connect_time":"$upstream_connect_time",'
                                '"error_reason":"$request_uri attempted",'
                                '"ssl_protocol":"$ssl_protocol"'
                                '}';
    
    # SSL/TLS connection log format
    log_format ssl_connection '{'
                              '"timestamp":"$time_iso8601",'
                              '"event":"SSL_CONNECTION",'
                              '"client_ip":"$remote_addr",'
                              '"ssl_protocol":"$ssl_protocol",'
                              '"ssl_cipher":"$ssl_cipher",'
                              '"ssl_client_cert":"$ssl_client_cert",'
                              '"ssl_session_id":"$ssl_session_id",'
                              '"ssl_session_reused":"$ssl_session_reused"'
                              '}';
    
    # ========================================================================
    # LOG FILE CONFIGURATION - Thailand Digital Crime Act Audit Trail
    # ========================================================================
    
    # Main traffic access log - all successful HTTP/HTTPS requests
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    
    # Detailed audit log - complete request/response for legal compliance
    access_log /var/log/nginx/audit.log audit_detailed buffer=32k flush=5s;
    
    # Connection failure/error log - failed requests and upstream errors
    access_log /var/log/nginx/connection_error.log connection_error 
               if=$loggable_error buffer=32k flush=5s;
    
    # SSL/TLS connection log - all secure connections for audit
    access_log /var/log/nginx/ssl_connection.log ssl_connection buffer=32k flush=5s;
    
    # Error log - comprehensive error tracking with debug level
    error_log /var/log/nginx/error.log debug;
    
    # ========================================================================
    # LOG LEVEL MAPPING AND ERROR CODES
    # ========================================================================
    # Used for conditional error logging below
    map $status $loggable_error {
        ~^[45] 1;  # Log all 4xx and 5xx errors
        default 0;
    }
    
    map $upstream_status $upstream_error {
        ~^[45] 1;  # Log upstream errors
        default 0;
    }
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Upstream backends
    upstream public_backend {
        server public_app:80;
    }
    
    upstream intranet_backend {
        server intranet_api:5000;
    }
    
    # Week 02: Stateless vs Stateful API backends (DEPRECATED FOR WEEK 03)
    # upstream stateless_backend {
    #     server stateless-api:3000;
    # }
    
    # upstream stateful_backend {
    #     server stateful-api:3001;
    # }
    
    # Week 03: Microservices backends
    upstream upload_service {
        server 172.18.0.7:8000;
    }
    
    upstream processing_service {
        server 172.19.0.7:8000;
    }
    
    upstream ai_service {
        server 172.19.0.8:8000;
    }
    
    # HTTP Server - Public Web
    server {
        listen 80;
        server_name localhost;
        
        # ====================================================================
        # LOGGING: All HTTP connections logged (success and failure)
        # ====================================================================
        access_log /var/log/nginx/public_app.log main;
        access_log /var/log/nginx/public_app_audit.log audit_detailed;
        error_log  /var/log/nginx/public_app_error.log debug;
        
        location / {
            # Proxy to public backend with logging
            proxy_pass http://public_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Log upstream connection status
            proxy_intercept_errors on;
            
            # Capture and log connection failures
            error_page 502 503 504 =502 @upstream_error;
        }
        
        location /health {
            proxy_pass http://public_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/health_check.log main;
        }
        
        # Week 02: Stateless API (JWT-based sessions) - DEPRECATED FOR WEEK 03
        # location /api/stateless/ {
        #     proxy_pass http://stateless_backend/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Request-ID $request_id;
        #     proxy_connect_timeout 60s;
        #     proxy_send_timeout 60s;
        #     proxy_read_timeout 60s;
        #     proxy_intercept_errors on;
        #     error_page 502 503 504 =502 @upstream_error;
        #     access_log /var/log/nginx/stateless_api.log main;
        #     access_log /var/log/nginx/stateless_api_audit.log audit_detailed;
        # }
        
        # Week 03: Upload Service
        location /api/upload/ {
            proxy_pass http://upload_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_intercept_errors on;
            error_page 502 503 504 =502 @upstream_error;
            access_log /var/log/nginx/upload_service.log main;
            access_log /var/log/nginx/upload_service_audit.log audit_detailed;
        }
        
        # Week 03: Processing Service
        location /api/processing/ {
            proxy_pass http://processing_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_intercept_errors on;
            error_page 502 503 504 =502 @upstream_error;
            access_log /var/log/nginx/processing_service.log main;
            access_log /var/log/nginx/processing_service_audit.log audit_detailed;
        }
        
        # Week 03: AI Service
        location /api/ai/ {
            proxy_pass http://ai_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_intercept_errors on;
            error_page 502 503 504 =502 @upstream_error;
            access_log /var/log/nginx/ai_service.log main;
            access_log /var/log/nginx/ai_service_audit.log audit_detailed;
        }
        
        # Error handling location with logging
        location @upstream_error {
            default_type application/json;
            return 502 '{"error":"upstream service unavailable","timestamp":"$time_iso8601","client":"$remote_addr"}';
            access_log /var/log/nginx/connection_error.log connection_error;
        }
    }
    
    # HTTPS Server - Intranet API
    server {
        listen 443 ssl;
        http2 on;
        server_name api.mockup.test localhost;
        
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        
        # ====================================================================
        # LOGGING: All HTTPS connections logged with SSL details
        # ====================================================================
        access_log /var/log/nginx/intranet_api.log main;
        access_log /var/log/nginx/intranet_api_audit.log audit_detailed;
        access_log /var/log/nginx/intranet_ssl.log ssl_connection;
        error_log  /var/log/nginx/intranet_api_error.log debug;
        
        # Log SSL connection details for each request
        set $req_id $http_x_request_id;
        if ($req_id = "") {
            set $req_id $request_time-$remote_addr;
        }
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Request-ID $req_id always;
        
        # API endpoints with detailed logging
        location /status {
            proxy_pass http://intranet_backend/status;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =502 @upstream_error;
            access_log /var/log/nginx/status_endpoint.log main;
            access_log /var/log/nginx/status_endpoint_audit.log audit_detailed;
        }
        
        location /data {
            proxy_pass http://intranet_backend/data;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =502 @upstream_error;
            access_log /var/log/nginx/data_endpoint.log main;
            access_log /var/log/nginx/data_endpoint_audit.log audit_detailed;
        }
        
        location /config {
            proxy_pass http://intranet_backend/config;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =502 @upstream_error;
            access_log /var/log/nginx/config_endpoint.log main;
            access_log /var/log/nginx/config_endpoint_audit.log audit_detailed;
        }
        
        # Week 02: Stateful API (Session-based) - DEPRECATED FOR WEEK 03
        # location /api/stateful/ {
        #     proxy_pass http://stateful_backend/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Request-ID $req_id;
        #     proxy_connect_timeout 60s;
        #     proxy_send_timeout 60s;
        #     proxy_read_timeout 60s;
        #     proxy_intercept_errors on;
        #     error_page 502 503 504 =502 @upstream_error;
        #     access_log /var/log/nginx/stateful_api.log main;
        #     access_log /var/log/nginx/stateful_api_audit.log audit_detailed;
        # }
        
        location /health {
            return 200 "healthy";
            add_header Content-Type text/plain;
            access_log /var/log/nginx/health_check_https.log main buffer=4k flush=1s;
        }
        
        location / {
            return 404 '{"error":"Endpoint not found","timestamp":"$time_iso8601","client":"$remote_addr"}';
            add_header Content-Type application/json;
            access_log /var/log/nginx/not_found.log connection_error;
        }
        
        # Error handling location with detailed logging
        location @upstream_error {
            default_type application/json;
            return 502 '{"error":"upstream service unavailable","timestamp":"$time_iso8601","client":"$remote_addr","request_id":"$req_id"}';
            access_log /var/log/nginx/connection_error.log connection_error;
        }
    }
}